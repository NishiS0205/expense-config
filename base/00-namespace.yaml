# base/00-namespace.yaml - the bounded blast radius for expense-api.
# ResourceQuota + LimitRange live separately in platform/00-quota.yaml,
# applied directly by the platform team (not synced by Argo CD -- the
# expense AppProject explicitly blacklists those two kinds so the app
# team's config repo cannot silently change its own resource ceiling).
apiVersion: v1
kind: Namespace
metadata:
  name: expense-dev
  labels:
    app.kubernetes.io/part-of: expense
