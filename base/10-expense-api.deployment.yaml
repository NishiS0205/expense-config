# manifests/10-expense-api.deployment.yaml - the workload.
# Pin the image by tag (NOT a moving label); set zero-downtime rollout
# defaults; use the three-probe pattern from Topic 7; surface the
# non-root UID from the D1 distroless image; wire envFrom both the
# ConfigMap and Secret.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: expense-api
  namespace: expense-dev
  labels:
    app.kubernetes.io/name:       expense-api
    app.kubernetes.io/component:  api
    app.kubernetes.io/part-of:    expense
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: expense-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0     # never drop below `replicas` during a rollout
      maxSurge:       1     # at most one extra pod during a rollout
  template:
    metadata:
      labels:
        app.kubernetes.io/name:      expense-api    # MUST match selector
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of:   expense
      annotations:
        # Restart on config / secret content change. CI computes the
        # hash; this placeholder is rewritten at apply time.
        checksum/config: "replace-at-apply-time"
        checksum/secret: "replace-at-apply-time"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser:    65532       # the distroless UID from W5 D1
        fsGroup:      65532
      containers:
      - name:  expense-api
        image: uptimecrew/expense-api:0.1.0
        imagePullPolicy: IfNotPresent
        ports:
        - { name: http, containerPort: 8080 }
        envFrom:
        - configMapRef: { name: expense-api-config }
        - secretRef:    { name: expense-api-secrets }
        # ----- resources (requests = scheduler floor; limits = kubelet kill line)
        resources:
          requests: { cpu: 250m,  memory: 512Mi }
          limits:   {              memory: 1Gi   }   # CPU limit omitted on purpose (Topic 6)
        env:
        # Make the JVM respect the cgroup memory limit, not host RAM.
        - name:  JAVA_TOOL_OPTIONS
          value: "-XX:MaxRAMPercentage=75.0 -XX:+ExitOnOutOfMemoryError"
        # ----- three probes (Topic 7) ----------------------------
        startupProbe:                                  # owns boot grace
          httpGet: { path: /actuator/health/liveness, port: http }
          periodSeconds:    5
          failureThreshold: 30                         # 30 x 5s = 150s grace
          timeoutSeconds:   3
        livenessProbe:                                 # "still alive?"
          httpGet: { path: /actuator/health/liveness, port: http }
          periodSeconds:      10
          timeoutSeconds:     3
          failureThreshold:   3
          initialDelaySeconds: 0                       # startupProbe owns boot
        readinessProbe:                                # "ready for traffic?"
          httpGet: { path: /actuator/health/readiness, port: http }
          periodSeconds:      5
          timeoutSeconds:     3
          failureThreshold:   3
          successThreshold:   1
          initialDelaySeconds: 0
