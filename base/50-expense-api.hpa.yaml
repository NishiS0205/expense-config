# manifests/50-expense-api.hpa.yaml - autoscale on CPU.
# autoscaling/v2 (NOT v1; v1 is CPU-only and missing the behavior block).
# Targets 70% of the container's `resources.requests.cpu`. Min 2 keeps
# the service highly-available; max 5 caps blast radius in the lab.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: expense-api
  namespace: expense-dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind:       Deployment
    name:       expense-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type:               Utilization
        averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0          # react fast on burst
      policies:
      - { type: Percent, value: 100, periodSeconds: 15 }
      - { type: Pods,    value: 2,   periodSeconds: 60 }
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300        # 5-minute cool-down (anti-flap)
      policies:
      - { type: Percent, value: 25, periodSeconds: 60 }
      selectPolicy: Min
