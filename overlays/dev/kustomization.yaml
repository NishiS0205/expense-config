# overlays/dev/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind:       Kustomization

resources:
  - ../../base

namespace: expense-dev

commonAnnotations:
  argocd.argoproj.io/sync-wave: "0"

images:
  - name:    uptimecrew/expense-api
    newName: uptimecrew/expense-api
    newTag:  1f1f1f1f1f1f1f1f1f1f1f1f1f1f1f1f1f1f1f1f

replicas:
  - name:  expense-api
    count: 1

patches:
  - target:
      kind: ConfigMap
      name: expense-api-config
    patch: |-
      - op: replace
        path: /data/SPRING_PROFILES_ACTIVE
        value: dev
      - op: replace
        path: /data/LOG_LEVEL
        value: DEBUG
