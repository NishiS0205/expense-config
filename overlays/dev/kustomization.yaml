# overlays/dev/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind:       Kustomization

resources:
  - ../../base

namespace: expense-dev

images:
  - name:    uptimecrew/expense-api
    newName: uptimecrew/expense-api
    newTag:  0f9e8618f9c844fb6d4337c08146cc5b5358ed09

replicas:
  - name:  expense-api
    count: 1

patches:
  - target:
      kind: ConfigMap
      name: expense-api-config
    patch: |-
      - op: replace
        path: /data/SPRING_PROFILES_ACTIVE
        value: dev
      - op: replace
        path: /data/LOG_LEVEL
        value: DEBUG
  # Namespace must land before Deployment/Service on a brand-new
  # cluster; sync-wave -1 puts it in its own earlier wave. This is
  # scoped to just the Namespace kind, not a blanket commonAnnotations
  # override on every resource in the overlay.
  - target:
      kind: Namespace
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          argocd.argoproj.io/sync-wave: "-1"
