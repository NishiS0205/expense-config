# argocd/projects/expense.yaml
# AppProject scoping the expense capstone team.
# The platform team owns this file in practice; the app team
# proposes changes via PR. Every Application in this assignment
# has spec.project = expense -- never "default".
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: expense
  namespace: argocd
  # Finalizer ensures Argo CD prunes generated Applications when
  # the project itself is deleted -- a defence against orphaned
  # workloads if the project is ever retired.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: expense-api capstone -- GitOps overlays + observability

  # WHICH repos may an Application in this project use as source?
  sourceRepos:
    - https://github.com/NishiS0205/expense-config.git

  # WHICH (cluster, namespace) pairs are legal?
  destinations:
    - server:    https://kubernetes.default.svc
      namespace: expense-dev
    - server:    https://kubernetes.default.svc
      namespace: expense-staging
    - server:    https://kubernetes.default.svc
      namespace: expense-prod

  # Cluster-scoped resources: the app team has NO business creating
  # ClusterRoles, CustomResourceDefinitions, or PersistentVolumes.
  # NOTE: despite the curriculum reference listing Namespace under
  # namespaceResourceWhitelist, Argo CD v3.3.12 rejects it there --
  # Namespace is cluster-scoped per `kubectl api-resources`, and
  # Argo CD's project validation checks scope against the K8s API,
  # not against which list a doc happens to put it in. Verified by
  # direct testing: namespaceResourceWhitelist placement reproduces
  # the exact same "not permitted" rejection every time.
  clusterResourceWhitelist:
    - {group: "", kind: Namespace}

  # Namespace-scoped resources: only the kinds the W5 D3 manifests
  # actually use.
  namespaceResourceWhitelist:
    - {group: "",                       kind: Service}
    - {group: "",                       kind: ConfigMap}
    - {group: "",                       kind: Secret}
    - {group: "",                       kind: ServiceAccount}
    - {group: apps,                     kind: Deployment}
    - {group: autoscaling,              kind: HorizontalPodAutoscaler}
    - {group: policy,                   kind: PodDisruptionBudget}
    - {group: networking.k8s.io,        kind: NetworkPolicy}
    - {group: networking.k8s.io,        kind: Ingress}
    - {group: monitoring.coreos.com,    kind: ServiceMonitor}
    - {group: monitoring.coreos.com,    kind: PrometheusRule}

  # Explicitly block quota knobs -- the platform team owns those.
  # (Applied separately via platform/00-quota.yaml, not through Argo CD.)
  namespaceResourceBlacklist:
    - {group: "", kind: ResourceQuota}
    - {group: "", kind: LimitRange}

  # Sync windows: deny auto-sync to prod over the weekend.
  # Manual sync still works (manualSync: true on the allow side),
  # but the controller will not promote on its own.
  syncWindows:
    - kind: deny
      schedule: "0 17 * * 5"        # Friday 17:00
      duration: 60h                 # through Monday 05:00
      applications:
        - "expense-api-prod"
      manualSync: true              # human can still force-sync on-call

  # Project-scoped RBAC -- two roles, not "any-developer-is-admin".
  roles:
    # Developers: read + sync in dev/staging; cannot touch prod.
    - name: developers
      description: Read everything; sync dev and staging only.
      policies:
        - p, proj:expense:developers, applications, get,    expense/*,                   allow
        - p, proj:expense:developers, applications, sync,   expense/expense-api-dev,     allow
        - p, proj:expense:developers, applications, sync,   expense/expense-api-staging, allow
        - p, proj:expense:developers, applications, delete, expense/*,                   deny
        - p, proj:expense:developers, logs,         get,    expense/*,                   allow
      groups:
        - uptimecrew:expense-engineers
    # Releasers: full sync including prod; still cannot override the
    # project's allow-lists (those live above).
    - name: releasers
      description: Full sync including prod. Cannot delete Applications.
      policies:
        - p, proj:expense:releasers, applications, get,      expense/*, allow
        - p, proj:expense:releasers, applications, sync,     expense/*, allow
        - p, proj:expense:releasers, applications, action/*, expense/*, allow
        - p, proj:expense:releasers, applications, delete,   expense/*, deny
      groups:
        - uptimecrew:expense-engineers-releasers
