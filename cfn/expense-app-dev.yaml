# cfn/expense-app-dev.yaml
# TASK 3 application stack: RDS PostgreSQL + Secrets Manager master
# credentials. Consumes the network stack exports via !ImportValue.
# The DB master password is NEVER a NoEcho Parameter -- it lives in
# Secrets Manager and is resolved at deploy time via the
# {{resolve:secretsmanager:...}} dynamic reference.
# Stateful resources carry BOTH DeletionPolicy: Retain AND
# UpdateReplacePolicy: Retain.
AWSTemplateFormatVersion: "2010-09-09"
Description: expense application stack -- RDS + Secrets Manager.

Parameters:
  EnvName:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  NetworkStackName:
    Type: String
    Default: expense-network-dev
    Description: Name of the network stack whose exports we !ImportValue.
  DbInstanceClass:
    Type: String
    Default: db.t4g.small
    AllowedValues: [db.t4g.small, db.t4g.medium, db.m6g.large]

Resources:
  DbMasterSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name:        expense/dev/db-master
      Description: !Sub "expense DB master credentials, ${EnvName}."
      GenerateSecretString:
        SecretStringTemplate: '{"username": "expense_master"}'
        GenerateStringKey:    password
        ExcludeCharacters:    '"@/\'
        PasswordLength:       32
      Tags:
        - {Key: Env,     Value: !Ref EnvName}
        - {Key: Project, Value: expense}

  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub "expense ${EnvName} private subnets"
      SubnetIds:
        !Split
          - ","
          - !ImportValue
            "Fn::Sub": "${NetworkStackName}-PrivateSubnets"
      Tags:
        - {Key: Env,     Value: !Ref EnvName}
        - {Key: Project, Value: expense}

  DbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "expense ${EnvName} DB SG (5432 from app SG only)."
      VpcId:
        !ImportValue
          "Fn::Sub": "${NetworkStackName}-VpcId"
      SecurityGroupIngress:
        - IpProtocol:             tcp
          FromPort:               5432
          ToPort:                 5432
          SourceSecurityGroupId:
            !ImportValue
              "Fn::Sub": "${NetworkStackName}-AppSgId"
          Description: Postgres from app SG only.
      Tags:
        - {Key: Name, Value: !Sub "expense-${EnvName}-db-sg"}

  DbInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DBInstanceIdentifier:  !Sub "expense-${EnvName}"
      Engine:                postgres
      EngineVersion:         "16.3"
      DBInstanceClass:       !Ref DbInstanceClass
      AllocatedStorage:      "20"
      StorageType:           gp3
      StorageEncrypted:      true
      DBSubnetGroupName:     !Ref DbSubnetGroup
      VPCSecurityGroups:     [!Ref DbSecurityGroup]
      PubliclyAccessible:    false
      MultiAZ:               false
      BackupRetentionPeriod: 7
      DeletionProtection:    true
      MasterUsername:
        "Fn::Sub": "{{resolve:secretsmanager:expense/dev/db-master:SecretString:username}}"
      MasterUserPassword:
        "Fn::Sub": "{{resolve:secretsmanager:expense/dev/db-master:SecretString:password}}"
      Tags:
        - {Key: Env,     Value: !Ref EnvName}
        - {Key: Project, Value: expense}

  SecretTargetAttachment:
    Type: AWS::SecretsManager::SecretTargetAttachment
    Properties:
      SecretId:   !Ref DbMasterSecret
      TargetId:   !Ref DbInstance
      TargetType: AWS::RDS::DBInstance

Outputs:
  DbEndpoint:
    Value: !GetAtt DbInstance.Endpoint.Address
    Export: {Name: !Sub "${AWS::StackName}-DbEndpoint"}
  DbSecretArn:
    Value: !Ref DbMasterSecret
    Export: {Name: !Sub "${AWS::StackName}-DbSecretArn"}
