# platform/00-quota.yaml
# ResourceQuota + LimitRange for expense-dev. Applied directly by the
# platform team via kubectl (kubectl apply -f platform/00-quota.yaml),
# NOT synced through Argo CD -- the expense AppProject's
# namespaceResourceBlacklist explicitly denies these two kinds so
# the app team's GitOps repo cannot silently widen its own quota.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: expense-dev-quota
  namespace: expense-dev
spec:
  hard:
    requests.cpu:    "4"
    requests.memory: 8Gi
    limits.cpu:      "8"
    limits.memory:   16Gi
    pods:            "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: expense-dev-defaults
  namespace: expense-dev
spec:
  limits:
  - type: Container
    default:        { cpu: 500m, memory: 768Mi }
    defaultRequest: { cpu: 100m, memory: 256Mi }
