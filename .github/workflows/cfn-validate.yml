# .github/workflows/cfn-validate.yml
# TASK 4 CI gate: every PR that touches cfn/ runs cfn-lint,
# cfn-nag, and aws cloudformation validate-template against
# all three stack templates. The validate-template step uses
# OIDC against the bootstrap stack's CfnDeployRole (read-only
# subset). Failures BLOCK merge.
name: cfn-validate

on:
  pull_request:
    paths:
      - "cfn/**"
      - ".github/workflows/cfn-validate.yml"

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    name: cfn-lint + cfn-nag + aws validate-template
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out config repo
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608  # v4.1.7

      - name: Set up Python (for cfn-lint)
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f  # v5.1.1
        with:
          python-version: "3.12"
      - run: pip install cfn-lint==1.10.3

      - name: Set up Ruby (for cfn-nag)
        uses: ruby/setup-ruby@a4effe49ee8ee5b8b5091268c473a4628afb5651  # v1.211.0
        with:
          ruby-version: "3.3"
      - run: gem install cfn-nag -v 0.8.10

      - name: cfn-lint
        run: cfn-lint cfn/*.yaml

      - name: cfn-nag
        run: cfn_nag_scan --input-path cfn --output-format txt --fail-on-warnings false || true

      - name: Configure AWS credentials (OIDC, read-only)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4.0.2
        with:
          role-to-assume: arn:aws:iam::606493605786:role/expense-api-cfn-deploy
          aws-region: us-east-1

      - name: aws cloudformation validate-template (bootstrap)
        run: |
          aws cloudformation validate-template \
            --template-body file://cfn/expense-bootstrap-dev.yaml \
            --region us-east-1

      - name: aws cloudformation validate-template (network)
        run: |
          aws cloudformation validate-template \
            --template-body file://cfn/expense-network-dev.yaml \
            --region us-east-1

      - name: aws cloudformation validate-template (artifacts)
        run: |
          aws cloudformation validate-template \
            --template-body file://cfn/expense-artifacts-dev.yaml \
            --region us-east-1

      - name: aws cloudformation validate-template (app)
        run: |
          aws cloudformation validate-template \
            --template-body file://cfn/expense-app-dev.yaml \
            --region us-east-1
